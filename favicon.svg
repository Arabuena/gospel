<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Fundo Arredondado -->
  <rect width="100" height="100" rx="20" fill="url(#grad)" />
  
  <!-- Símbolo da Bíblia Aberta -->
  <g fill="white" transform="translate(15, 25) scale(0.7)">
    <!-- Capa/Base -->
    <path d="M5 80 Q 50 90 95 80 L 95 10 Q 50 20 5 10 Z" fill="#0b1220" opacity="0.3" />
    <!-- Páginas Esquerdas -->
    <path d="M50 85 Q 25 85 5 75 L 5 5 Q 25 15 50 15 Z" />
    <!-- Páginas Direitas -->
    <path d="M50 85 Q 75 85 95 75 L 95 5 Q 75 15 50 15 Z" />
    <!-- Divisor Central -->
    <rect x="48" y="15" width="4" height="70" fill="#7c3aed" opacity="0.5" rx="2" />
  </g>
  
  <!-- Cruz Minimalista Central -->
  <rect x="48" y="35" width="4" height="20" fill="#7c3aed" rx="1" />
  <rect x="42" y="41" width="16" height="4" fill="#7c3aed" rx="1" />
</svg>